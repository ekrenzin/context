<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Context - UI Recovery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      max-width: 480px;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
    p { margin-bottom: 1rem; line-height: 1.6; color: #999; }
    .error { color: #f44336; font-family: monospace; font-size: 0.85rem; margin: 1rem 0; padding: 1rem; background: rgba(244,67,54,0.1); border-radius: 8px; text-align: left; word-break: break-word; }
    .actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .primary { background: #7c4dff; color: #fff; }
    .primary:hover { background: #651fff; }
    .secondary { background: transparent; color: #7c4dff; border: 1px solid #7c4dff; }
    .secondary:hover { background: rgba(124,77,255,0.1); }
    .spinner { display: none; margin: 1rem auto; width: 24px; height: 24px; border: 3px solid #333; border-top-color: #7c4dff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Context UI Not Available</h1>
    <p>The Command Center UI could not be loaded. This can happen if the UI repository is missing, corrupted, or dependencies need to be installed.</p>
    <div class="error" id="error"></div>
    <div class="spinner" id="spinner"></div>
    <div class="actions">
      <button class="primary" id="repair" onclick="repair()">Repair UI</button>
      <button class="secondary" id="reset" onclick="resetUi()">Reset to Defaults</button>
    </div>
  </div>
  <script>
    const errorEl = document.getElementById('error');
    const spinnerEl = document.getElementById('spinner');
    const repairBtn = document.getElementById('repair');
    const resetBtn = document.getElementById('reset');

    // Receive error from Electron main process
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'ui-error') {
        errorEl.textContent = e.data.message;
      }
    });

    // Check if ctx bridge is available
    if (window.ctx?.getUiError) {
      window.ctx.getUiError().then((msg) => {
        if (msg) errorEl.textContent = msg;
      });
    }

    function setLoading(loading) {
      spinnerEl.style.display = loading ? 'block' : 'none';
      repairBtn.disabled = loading;
      resetBtn.disabled = loading;
    }

    async function repair() {
      setLoading(true);
      errorEl.textContent = 'Repairing...';
      try {
        if (window.ctx?.repairUi) {
          const result = await window.ctx.repairUi();
          if (result.success) {
            errorEl.textContent = 'Repair successful. Reloading...';
            setTimeout(() => window.location.reload(), 1000);
          } else {
            errorEl.textContent = result.error || 'Repair failed.';
          }
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Repair failed.';
      } finally {
        setLoading(false);
      }
    }

    async function resetUi() {
      if (!confirm('This will delete the Command Center UI and re-clone from upstream. Local changes will be lost.')) return;
      setLoading(true);
      errorEl.textContent = 'Resetting...';
      try {
        if (window.ctx?.resetUi) {
          const result = await window.ctx.resetUi();
          if (result.success) {
            errorEl.textContent = 'Reset successful. Reloading...';
            setTimeout(() => window.location.reload(), 1000);
          } else {
            errorEl.textContent = result.error || 'Reset failed.';
          }
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Reset failed.';
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
