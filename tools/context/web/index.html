<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-bg: #0f172a;
      --brand-surface: #1e293b;
      --brand-primary: #60a5fa;
      --brand-text: #f1f5f9;
      --brand-text-sec: #94a3b8;
      --brand-accent: linear-gradient(135deg, #3b82f6, #6366f1);
      --brand-glow: rgba(96, 165, 250, 0.25);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --brand-bg: #f8fafc;
        --brand-surface: #ffffff;
        --brand-primary: #2563eb;
        --brand-text: #0f172a;
        --brand-text-sec: #475569;
        --brand-glow: rgba(37, 99, 235, 0.2);
      }
    }

    body {
      margin: 0;
      background: var(--brand-bg);
      color-scheme: light dark;
    }

    #ctx-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--brand-bg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 20px;
    }

    #ctx-splash .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #ctx-splash .wordmark-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #ctx-splash .wordmark-icon img {
      width: 64px;
      height: 64px;
      border-radius: 16px;
    }

    #ctx-splash .wordmark-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: var(--brand-text-sec);
      text-transform: uppercase;
    }

    #ctx-splash .divider {
      width: 48px;
      height: 1px;
      background: var(--brand-primary);
      opacity: 0.4;
    }

    #ctx-splash .label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--brand-text-sec);
      opacity: 0.7;
      text-transform: uppercase;
    }

    @keyframes ctx-bar {
      0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    #ctx-splash .bars {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 18px;
    }

    #ctx-splash .bar {
      width: 3px;
      height: 100%;
      background: var(--brand-primary);
      border-radius: 2px;
      transform-origin: center;
      animation: ctx-bar 1.1s ease-in-out infinite;
    }

    #ctx-splash .bar:nth-child(1) { animation-delay: 0s; }
    #ctx-splash .bar:nth-child(2) { animation-delay: 0.15s; }
    #ctx-splash .bar:nth-child(3) { animation-delay: 0.3s; }
    #ctx-splash .bar:nth-child(4) { animation-delay: 0.45s; }
    #ctx-splash .bar:nth-child(5) { animation-delay: 0.6s; }

    #ctx-splash .status-log {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--brand-text-sec);
      opacity: 0.45;
      font-family: 'Courier New', Courier, monospace;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="ctx-splash">
      <div class="wordmark">
        <div class="wordmark-icon">
          <img src="/logo.png" alt="Context" />
        </div>
        <span id="ctx-name" class="wordmark-sub">Context</span>
      </div>
      <div class="divider"></div>
      <span id="ctx-subtitle" class="label">Command Center</span>
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    <div id="ctx-status-log" class="status-log">connecting to server...</div>
  </div>
  <script>
    (function () {
      var root = document.documentElement;
      var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      fetch('/api/branding', { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (cfg) {
          if (!cfg) return;
          window.__CTX_BRANDING__ = cfg;
          var p = isDark ? cfg.dark : cfg.light;
          root.style.setProperty('--brand-bg', p.background);
          root.style.setProperty('--brand-surface', p.surface);
          root.style.setProperty('--brand-primary', p.primary);
          root.style.setProperty('--brand-text', p.text);
          root.style.setProperty('--brand-text-sec', p.textSecondary);
          if (cfg.accentGradient) root.style.setProperty('--brand-accent', cfg.accentGradient);

          var nameEl = document.getElementById('ctx-name');
          var subEl = document.getElementById('ctx-subtitle');
          if (nameEl && cfg.name) nameEl.textContent = cfg.name;
          if (subEl && cfg.subtitle) subEl.textContent = cfg.subtitle;
          document.title = (cfg.name || 'Context') + ' ' + (cfg.subtitle || 'Command Center');
        })
        .catch(function () {});

      var el = document.getElementById('ctx-status-log');
      if (!el) return;

      var fallback = [
        'connecting to server...',
        'loading session data...',
        'syncing agent profile...',
        'reading skill graph...',
        'initializing dashboard...',
      ];
      var fallbackIdx = 0;
      var fallbackTimer = null;

      function startFallback() {
        fallbackTimer = setInterval(function () {
          fallbackIdx = (fallbackIdx + 1) % fallback.length;
          el.textContent = fallback[fallbackIdx];
        }, 1800);
      }

      function poll() {
        fetch('/api/stats', { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            clearInterval(fallbackTimer);
            fallbackTimer = null;
            var parts = [];
            if (data.totalSessions !== undefined) parts.push('sessions: ' + data.totalSessions);
            if (data.productiveRate !== undefined) parts.push('productive: ' + data.productiveRate + '%');
            if (data.currentStreak !== undefined && data.currentStreak > 0) parts.push('streak: ' + data.currentStreak + 'd');
            el.textContent = parts.length ? parts.join('  \u00B7  ') : 'server ready';
          })
          .catch(function () {
            if (!fallbackTimer) startFallback();
          });
      }

      startFallback();
      poll();
      var pollTimer = setInterval(poll, 2000);

      window.addEventListener('load', function () {
        clearInterval(fallbackTimer);
        clearInterval(pollTimer);
      });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
