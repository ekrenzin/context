<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #050505;
      color-scheme: light dark;
    }

    #ctx-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #050505;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 20px;
    }

    #ctx-splash .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #ctx-splash .wordmark-logo {
      width: 96px;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.35));
    }

    #ctx-splash .wordmark-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: #c9b27a;
      text-transform: uppercase;
    }

    #ctx-splash .divider {
      width: 48px;
      height: 1px;
      background: #d4af37;
      opacity: 0.4;
    }

    #ctx-splash .label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: #c9b27a;
      opacity: 0.7;
      text-transform: uppercase;
    }

    @keyframes ctx-bar {
      0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    #ctx-splash .bars {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 18px;
    }

    #ctx-splash .bar {
      width: 3px;
      height: 100%;
      background: #d4af37;
      border-radius: 2px;
      transform-origin: center;
      animation: ctx-bar 1.1s ease-in-out infinite;
    }

    #ctx-splash .bar:nth-child(1) { animation-delay: 0s; }
    #ctx-splash .bar:nth-child(2) { animation-delay: 0.15s; }
    #ctx-splash .bar:nth-child(3) { animation-delay: 0.3s; }
    #ctx-splash .bar:nth-child(4) { animation-delay: 0.45s; }
    #ctx-splash .bar:nth-child(5) { animation-delay: 0.6s; }

    #ctx-splash .status-log {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: #c9b27a;
      opacity: 0.45;
      font-family: 'Courier New', Courier, monospace;
      transition: opacity 0.3s ease;
    }

    @media (prefers-color-scheme: light) {
      body { background: #f8f5ea; }
      #ctx-splash { background: #f8f5ea; }
      #ctx-splash .wordmark-sub { color: #3a3a3a; }
      #ctx-splash .wordmark-logo { filter: drop-shadow(0 0 18px rgba(138, 106, 10, 0.25)); }
      #ctx-splash .divider { background: #8a6a0a; }
      #ctx-splash .label { color: #3a3a3a; }
      #ctx-splash .bar { background: #8a6a0a; }
      #ctx-splash .status-log { color: #3a3a3a; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="ctx-splash">
      <div class="wordmark">
        <img class="wordmark-logo" src="/logo.png" alt="Context" />
        <span class="wordmark-sub">Context</span>
      </div>
      <div class="divider"></div>
      <span class="label">Command Center</span>
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    <div id="ctx-status-log" class="status-log">connecting to server...</div>
  </div>
  <script>
    (function () {
      var el = document.getElementById('sos-status-log');
      if (!el) return;

      var fallback = [
        'connecting to server...',
        'loading session data...',
        'syncing agent profile...',
        'reading skill graph...',
        'initializing dashboard...',
      ];
      var fallbackIdx = 0;
      var fallbackTimer = null;

      function startFallback() {
        fallbackTimer = setInterval(function () {
          fallbackIdx = (fallbackIdx + 1) % fallback.length;
          el.textContent = fallback[fallbackIdx];
        }, 1800);
      }

      function poll() {
        fetch('/api/stats', { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            clearInterval(fallbackTimer);
            fallbackTimer = null;
            var parts = [];
            if (data.totalSessions !== undefined) parts.push('sessions: ' + data.totalSessions);
            if (data.productiveRate !== undefined) parts.push('productive: ' + data.productiveRate + '%');
            if (data.currentStreak !== undefined && data.currentStreak > 0) parts.push('streak: ' + data.currentStreak + 'd');
            el.textContent = parts.length ? parts.join('  \u00B7  ') : 'server ready';
          })
          .catch(function () {
            if (!fallbackTimer) startFallback();
          });
      }

      startFallback();
      poll();
      var pollTimer = setInterval(poll, 2000);

      window.addEventListener('load', function () {
        clearInterval(fallbackTimer);
        clearInterval(pollTimer);
      });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
